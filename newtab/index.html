<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Background layer -->
  <div id="background"></div>
  <div id="overlay"></div>

  <!-- Top-right widgets (Momentum layout) -->
  <div id="top-right">
    <div id="weather" class="weather-top">
      <span id="weather-icon"></span>
      <span id="weather-temp"></span>
      <span id="weather-city"></span>
    </div>
    <button id="bg-refresh" class="bg-btn" title="New photo (→)">↻</button>
    <button id="settings-toggle" class="settings-btn" title="Settings">⚙</button>
  </div>

  <!-- Main centered content -->
  <main id="main-content">
    <div id="clock" class="time"></div>
    <div id="greeting" class="greeting"></div>
    <div id="focus-area" class="focus">
      <input type="text" id="focus-input" placeholder="What is your main focus today?" maxlength="120" autocomplete="off">
      <div id="focus-display" class="focus-display"></div>
    </div>
  </main>

  <div id="quote" class="widget quote-widget">
    <span id="quote-text"></span>
  </div>

  <!-- Hermes briefing overlay -->
  <div id="briefing" class="briefing-widget hidden">
    <div id="briefing-greeting"></div>
    <div id="briefing-focus"></div>
    <div id="briefing-calendar"></div>
    <div id="briefing-note"></div>
    <button id="briefing-dismiss" class="icon-btn" title="Dismiss">×</button>
  </div>

  <!-- Quick links -->
  <div id="links-bar" class="links-bar">
    <div id="links-container"></div>
    <button id="add-link-btn" class="icon-btn" title="Add link">+</button>
  </div>

  <!-- To-do panel -->
  <button id="todo-toggle" class="widget todo-toggle" title="To-do list">
    <span id="todo-count">0</span>
  </button>

  <div id="todo-panel" class="todo-panel hidden">
    <div class="todo-header">
      <h2>To-do</h2>
      <button id="todo-close" class="icon-btn">×</button>
    </div>
    <input type="text" id="todo-input" placeholder="Add a to-do..." autocomplete="off">
    <ul id="todo-list"></ul>
  </div>

  <!-- Settings -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-header">
      <h2>Settings</h2>
      <button id="settings-close" class="icon-btn">×</button>
    </div>
    <div class="settings-body">
      <label>
        <span>Your name</span>
        <input type="text" id="setting-name" placeholder="Your name" maxlength="50">
      </label>
      <label>
        <span>Clock format</span>
        <select id="setting-clock-format">
          <option value="12">12-hour</option>
          <option value="24">24-hour</option>
        </select>
      </label>
      <label>
        <span>Show seconds</span>
        <input type="checkbox" id="setting-show-seconds">
      </label>
      <label>
        <span>Temperature unit</span>
        <select id="setting-unit">
          <option value="imperial">Fahrenheit</option>
          <option value="metric">Celsius</option>
        </select>
      </label>
      <label>
        <span>Photo source</span>
        <select id="setting-photo-source">
          <option value="lorem">Curated web (LoremFlickr)</option>
          <option value="unsplash">Unsplash (needs API key)</option>
          <option value="local">Local folder</option>
        </select>
      </label>
      <label id="local-folder-label">
        <span>Folder</span>
        <div style="display:flex;gap:8px">
          <input type="text" id="setting-local-folder" readonly placeholder="No folder selected" style="flex:1">
          <button type="button" id="btn-choose-folder" style="padding:8px 14px;background:var(--accent);border:1px solid var(--accent-hover);border-radius:var(--radius-sm);color:var(--text-primary);cursor:pointer;font-size:13px;white-space:nowrap">Choose…</button>
        </div>
      </label>
      <label>
        <span>Photo category</span>
        <select id="setting-photo-category">
          <option value="nature">Nature</option>
          <option value="water">Minimal / Water</option>
          <option value="architecture">Architecture</option>
          <option value="city">Travel / City</option>
        </select>
      </label>
      <label>
        <span>Unsplash API key <em style="opacity:0.5;font-weight:300">— for premium photos</em></span>
        <input type="text" id="setting-unsplash-key" placeholder="Paste your Unsplash Access Key" maxlength="64">
      </label>
      <label>
        <span>Hermes integration</span>
        <input type="checkbox" id="setting-hermes">
      </label>
      <label id="hermes-url-label" style="display:none">
        <span>Hermes API URL</span>
        <input type="text" id="setting-hermes-url" placeholder="http://localhost:8942">
      </label>
    </div>
  </div>

  <!-- Search / Hermes command bar -->
  <div id="command-bar" class="command-bar">
    <input type="text" id="command-input" placeholder="Ask Hermes or search..." autocomplete="off">
    <div id="command-results" class="command-results hidden"></div>
  </div>

  <script src="hermes.js"></script>
  <script src="app.js"></script>
</body>
</html>
